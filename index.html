<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Practice Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased min-h-screen flex flex-col items-center">

    <main class="w-full max-w-[500px] bg-gray-100 min-h-screen flex flex-col relative shadow-2xl overflow-hidden">
        
        <header id="quiz-header" class="hidden flex-col w-full bg-white shadow-sm z-10">
            <div class="h-1 w-full bg-gray-200">
                <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-300 w-0"></div>
            </div>
            <div class="px-6 py-4 flex justify-between items-center">
                <h1 class="text-lg font-bold text-gray-700">Practice Quiz</h1>
                <span id="progress-text" class="text-sm font-medium text-gray-500">0/0</span>
            </div>
        </header>

        <div class="flex-1 px-4 py-6 overflow-y-auto pb-24">
            
            <div id="loading-screen" class="flex flex-col items-center justify-center h-full">
                <p class="text-gray-500 animate-pulse font-medium">Loading questions...</p>
            </div>

            <div id="quiz-screen" class="hidden flex-col gap-6">
                <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                    <h2 id="question-text" class="text-lg font-semibold text-gray-800 leading-snug">
                        </h2>
                </div>

                <div id="options-container" class="flex flex-col gap-3">
                    </div>

                <div id="explanation-container" class="hidden bg-blue-50 text-blue-900 p-4 rounded-xl text-sm border border-blue-100">
                    <p class="font-bold mb-1">Explanation:</p>
                    <p id="explanation-text"></p>
                </div>

                <button id="btn-check" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed mt-2" disabled>
                    Check Answer
                </button>
                <button id="btn-next" class="hidden w-full bg-gray-800 hover:bg-gray-900 text-white font-semibold py-3.5 rounded-xl transition-colors mt-2">
                    Next Question
                </button>
            </div>

            <div id="results-screen" class="hidden flex-col items-center justify-center h-full text-center mt-10">
                <div class="bg-white rounded-2xl shadow-sm p-8 border border-gray-100 w-full">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Quiz Complete!</h2>
                    <p class="text-gray-500 mb-6">Here is how you did:</p>
                    <div class="text-5xl font-extrabold text-blue-600 mb-4" id="score-percentage">
                        0%
                    </div>
                    <p class="text-md text-gray-600 mb-8">
                        You scored <span id="score-text" class="font-bold">0</span> out of <span id="total-text" class="font-bold">0</span>.
                    </p>
                    <button onclick="location.reload()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition-colors">
                        Retake Quiz
                    </button>
                </div>
            </div>

        </div>

        <div class="absolute bottom-0 w-full bg-gray-50 border-t border-gray-200 flex justify-center py-2 z-20">
            <div id="ad-space" class="w-[320px] h-[50px] bg-gray-300 border border-dashed border-gray-400 flex items-center justify-center text-xs text-gray-500 font-medium">
                Ad Space (320x50)
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
